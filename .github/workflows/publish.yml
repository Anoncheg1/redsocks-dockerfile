#
---
name: Build and Push to GHCR
# 'on': push
'on': workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE=ghcr.io/anoncheg1/redsocks:latest" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/ppc64le,linux/arm/v7,linux/arm/v8
