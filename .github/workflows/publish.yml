#
---
name: Build and Push to GHCR
# 'on': push
'on': workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     platform:
    #       - linux/amd64
    #       # - linux/386
    #       - linux/arm/v6
    #       - linux/arm/v7
    #       - linux/arm/v8
    #       - linux/arm64
    #       # - linux/ppc64le
    #       # - windows/amd64
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE=ghcr.io/anoncheg1/redsocks:latest" >> $GITHUB_ENV
        # platform=${{ matrix.platform }}
        # platform=${platform//\//-}
        # echo "TAG=${{ env.TMP_LOCAL_IMAGE }}:${platform}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          platforms: linux/amd64,linux/arm64, linux/arm/v8, linux/arm/v7
